<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Easy Git logo">
  <title>Easy Git</title>
  <rect width="256" height="256" rx="48" fill="#7c3aed"/>

  <!-- Standard folder icon (Lucide-style: tab on top-left with diagonal lid) -->
  <path d="
    M 64 92
    L 100 92
    Q 110 92 117 99
    L 130 116
    Q 134 120 140 120
    L 192 120
    Q 208 120 208 136
    L 208 200
    Q 208 216 192 216
    L 64 216
    Q 48 216 48 200
    L 48 108
    Q 48 92 64 92
    Z
  " fill="#FFFFFF"/>

  <!-- Git branch growing out of the folder top -->
  <g fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <line x1="160" y1="120" x2="160" y2="52"/>
    <path d="M 160 86 Q 160 52 196 52"/>
  </g>

  <!-- Commit nodes -->
  <circle cx="160" cy="52" r="13" fill="#FFFFFF"/>
  <circle cx="196" cy="52" r="13" fill="#FFFFFF"/>
  <circle cx="160" cy="86" r="8" fill="#7c3aed" stroke="#FFFFFF" stroke-width="4"/>
</svg>
